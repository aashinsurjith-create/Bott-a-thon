<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decision Helper Bot — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4F46E5; --secondary: #8B5CF6; --accent: #14B8A6;
      --bg-start: #ffffff; --bg-end: #f0eeff;
      --surface: rgba(255,255,255,0.80); --surface-border: rgba(139,92,246,0.18);
      --text: #1F2937; --text-muted: #6B7280; --success: #22C55E;
      --error: #EF4444; --shadow: 0 8px 40px rgba(79,70,229,0.14);
      --transition: 200ms ease-in-out;
    }
    [data-theme="dark"] {
      --bg-start: #0f0e1a; --bg-end: #1a1730;
      --surface: rgba(30,27,60,0.88); --surface-border: rgba(139,92,246,0.28);
      --text: #F3F4F6; --text-muted: #9CA3AF;
      --shadow: 0 8px 40px rgba(0,0,0,0.45);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; color: var(--text);
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.18; pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--primary); top: -120px; left: -120px; }
    .blob-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -80px; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 60%; }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      background: var(--surface); backdrop-filter: blur(20px);
      border: 1px solid var(--surface-border); border-radius: 24px;
      padding: 44px 40px; width: 100%; max-width: 440px;
      box-shadow: var(--shadow);
      animation: cardIn 500ms cubic-bezier(.34,1.4,.64,1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 28px; }
    .brand-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; box-shadow: 0 8px 28px rgba(79,70,229,0.32);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .brand-name {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand-sub { font-size: 0.85rem; color: var(--text-muted); text-align: center; line-height: 1.5; }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: rgba(79,70,229,0.07);
      border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 9px; border-radius: 9px; border: none;
      background: transparent; font-size: 0.88rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all var(--transition);
    }
    .tab.active {
      background: var(--surface); color: var(--primary);
      box-shadow: 0 2px 10px rgba(79,70,229,0.14);
    }

    /* ── Form ── */
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
    .input-wrap {
      position: relative; display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 13px; font-size: 0.95rem; pointer-events: none;
      color: var(--text-muted);
    }
    .form-input {
      width: 100%; padding: 12px 14px 12px 38px;
      border-radius: 11px; border: 1.5px solid var(--surface-border);
      background: rgba(79,70,229,0.04); font-size: 0.9rem;
      color: var(--text); outline: none; font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.11);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .eye-btn {
      position: absolute; right: 12px; background: none; border: none;
      cursor: pointer; font-size: 1rem; color: var(--text-muted);
      transition: color var(--transition);
    }
    .eye-btn:hover { color: var(--primary); }

    /* ── Error ── */
    .error-msg {
      font-size: 0.78rem; color: var(--error); display: none;
      padding: 9px 12px; background: rgba(239,68,68,0.08);
      border-radius: 8px; border: 1px solid rgba(239,68,68,0.2);
      animation: shake 300ms ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    /* ── Submit ── */
    .submit-btn {
      padding: 13px; margin-top: 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      box-shadow: 0 4px 18px rgba(79,70,229,0.32);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { transform: scale(1.03); box-shadow: 0 6px 24px rgba(79,70,229,0.44); }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.75rem; color: var(--text-muted); margin: 4px 0;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--surface-border); }

    /* ── Social ── */
    .social-row { display: flex; gap: 10px; }
    .social-btn {
      flex: 1; padding: 11px; border-radius: 11px;
      border: 1.5px solid var(--surface-border); background: var(--surface);
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .social-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.03); }

    /* ── Theme toggle ── */
    .theme-row {
      display: flex; justify-content: center; margin-top: 20px;
    }
    .theme-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 99px;
      background: rgba(79,70,229,0.07); border: none;
      font-size: 0.78rem; color: var(--text-muted); cursor: pointer;
      transition: background var(--transition);
    }
    .theme-pill:hover { background: rgba(79,70,229,0.13); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--surface-border);
      backdrop-filter: blur(16px); border-radius: 12px;
      padding: 12px 18px; font-size: 0.85rem; color: var(--text);
      box-shadow: 0 8px 32px rgba(79,70,229,0.18);
      animation: toastIn 300ms ease; z-index: 100;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <div class="brand-name">Decision Helper Bot</div>
      <div class="brand-sub">Make clear, confident decisions — step by step.</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Form -->
    <div class="form" id="authForm">
      <div class="form-group" id="nameGroup" style="display:none">
        <label class="form-label">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input class="form-input" id="inputName" type="text" placeholder="Your full name" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input class="form-input" id="inputEmail" type="email" placeholder="you@example.com" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="form-input" id="inputPassword" type="password" placeholder="••••••••" />
          <button class="eye-btn" onclick="togglePwd()" id="eyeBtn" type="button">👁</button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="submit-btn" id="submitBtn" onclick="handleAuth()">
        <div class="spinner" id="spinner"></div>
        <span id="submitLabel">Sign In</span>
      </button>
    </div>

    <div class="divider">or continue with</div>
    <div class="social-row">
      <button class="social-btn" onclick="socialLogin('Google')">🌐 Google</button>
      <button class="social-btn" onclick="socialLogin('GitHub')">🐙 GitHub</button>
    </div>

    <div class="theme-row">
      <button class="theme-pill" onclick="toggleTheme()" id="themePill">🌙 Dark mode</button>
    </div>
  </div>

<script>
  let authMode = 'signin';
  let isDark = false;

  // If already logged in, go straight to app
  if (localStorage.getItem('dhb_token')) {
    window.location.href = 'app.html';
  }

  function switchTab(mode) {
    authMode = mode;
    document.getElementById('tabSignIn').classList.toggle('active', mode === 'signin');
    document.getElementById('tabSignUp').classList.toggle('active', mode === 'signup');
    document.getElementById('nameGroup').style.display = mode === 'signup' ? 'flex' : 'none';
    document.getElementById('submitLabel').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
    hideError();
  }

  function togglePwd() {
    const inp = document.getElementById('inputPassword');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function handleAuth() {
    const email = document.getElementById('inputEmail').value.trim();
    const password = document.getElementById('inputPassword').value;
    const name = document.getElementById('inputName').value.trim();

    if (!email || !password) return showError('Please fill in all required fields.');
    if (authMode === 'signup' && !name) return showError('Please enter your full name.');
    if (password.length < 6) return showError('Password must be at least 6 characters.');

    setLoading(true);
    try {
      const endpoint = authMode === 'signin' ? '/api/signin' : '/api/signup';
      const body = authMode === 'signin' ? { email, password } : { name, email, password };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Something went wrong.');
      localStorage.setItem('dhb_token', data.token);
      localStorage.setItem('dhb_user', JSON.stringify(data.user));
      showToast(`👋 Welcome, ${data.user.name}!`);
      setTimeout(() => window.location.href = 'app.html', 800);
    } catch {
      showError('Cannot connect to server. Make sure it is running.');
    } finally {
      setLoading(false);
    }
  }

  function socialLogin(provider) {
    // Simulate social login (no real OAuth)
    const user = { id: Date.now(), name: `${provider} User`, email: `user@${provider.toLowerCase()}.com` };
    localStorage.setItem('dhb_token', 'social_' + Date.now());
    localStorage.setItem('dhb_user', JSON.stringify(user));
    showToast(`✅ Signed in with ${provider}`);
    setTimeout(() => window.location.href = 'app.html', 800);
  }

  function setLoading(on) {
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('submitBtn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠️ ' + msg; el.classList.add('show');
    setLoading(false);
  }

  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('themePill').textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
  }

  function showToast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  // Enter key submits
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
</script>
</body>
</html>
