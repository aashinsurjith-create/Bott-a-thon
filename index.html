<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Helper Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4F46E5; --secondary: #8B5CF6; --accent: #14B8A6;
      --bg-start: #ffffff; --bg-end: #f0eeff;
      --surface: rgba(255,255,255,0.72); --surface-border: rgba(139,92,246,0.15);
      --text: #1F2937; --text-muted: #6B7280; --success: #22C55E;
      --bot-bubble: linear-gradient(135deg,#f5f3ff,#ede9fe);
      --user-bubble: #4F46E5;
      --shadow: 0 4px 24px rgba(79,70,229,0.10);
      --shadow-hover: 0 8px 32px rgba(79,70,229,0.18);
      --radius: 16px; --transition: 200ms ease-in-out;
    }
    [data-theme="dark"] {
      --bg-start: #0f0e1a; --bg-end: #1a1730;
      --surface: rgba(30,27,60,0.80); --surface-border: rgba(139,92,246,0.25);
      --text: #F3F4F6; --text-muted: #9CA3AF;
      --bot-bubble: linear-gradient(135deg,#1e1b3c,#2d2660);
      --shadow: 0 4px 24px rgba(0,0,0,0.40);
      --shadow-hover: 0 8px 32px rgba(79,70,229,0.30);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh; color: var(--text);
      transition: background var(--transition), color var(--transition);
    }
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 270px; background: var(--surface); backdrop-filter: blur(16px);
      border-right: 1px solid var(--surface-border);
      display: flex; flex-direction: column; padding: 20px 14px;
      gap: 18px; flex-shrink: 0; overflow: hidden;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; color: var(--primary); }
    .sidebar-logo .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    /* User profile strip */
    .user-strip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(79,70,229,0.07); cursor: pointer;
      transition: background var(--transition);
    }
    .user-strip:hover { background: rgba(79,70,229,0.13); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: white; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sign-in-btn {
      width: 100%; padding: 10px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 3px 12px rgba(79,70,229,0.30);
    }
    .sign-in-btn:hover { transform: scale(1.03); box-shadow: 0 5px 16px rgba(79,70,229,0.40); }

    /* ── History Section ── */
    .sidebar-section-title {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--text-muted); padding: 0 4px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-count {
      background: rgba(79,70,229,0.12); color: var(--primary);
      font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px;
    }
    .history-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .history-scroll::-webkit-scrollbar { width: 3px; }
    .history-scroll::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.2); border-radius: 99px; }
    .history-empty {
      text-align: center; padding: 24px 8px;
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
    }
    .history-empty .empty-icon { font-size: 1.8rem; margin-bottom: 8px; }

    /* History card */
    .history-card {
      padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--surface-border);
      background: rgba(79,70,229,0.04);
      cursor: pointer; transition: all var(--transition);
      display: flex; flex-direction: column; gap: 5px;
    }
    .history-card:hover { background: rgba(79,70,229,0.09); border-color: rgba(79,70,229,0.25); transform: translateX(2px); }
    .history-card-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .history-topic { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .history-winner-badge {
      font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px;
      background: rgba(34,197,94,0.15); color: var(--success); white-space: nowrap; flex-shrink: 0;
    }
    .history-summary { font-size: 0.73rem; color: var(--text-muted); line-height: 1.5; }
    .history-meta { display: flex; align-items: center; gap: 8px; }
    .history-conf { font-size: 0.68rem; color: var(--primary); font-weight: 600; }
    .history-time { font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }

    /* ── Sidebar Footer ── */
    .sidebar-footer { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .theme-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px; background: rgba(79,70,229,0.07);
      cursor: pointer; font-size: 0.82rem; color: var(--text-muted);
      transition: background var(--transition); border: none; width: 100%;
    }
    .theme-toggle:hover { background: rgba(79,70,229,0.14); }
    .toggle-track { width: 34px; height: 18px; background: var(--text-muted); border-radius: 10px; position: relative; transition: background var(--transition); }
    .toggle-track.on { background: var(--primary); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform var(--transition); }
    .toggle-track.on .toggle-thumb { transform: translateX(16px); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header {
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--surface-border);
    }
    .header-title { font-weight: 700; font-size: 1rem; color: var(--text); }
    .header-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--surface-border); background: var(--surface);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--text-muted); transition: all var(--transition);
    }
    .icon-btn:hover { background: rgba(79,70,229,0.10); color: var(--primary); transform: scale(1.05); }
    .progress-bar-wrap {
      padding: 8px 24px 12px; background: var(--surface);
      border-bottom: 1px solid var(--surface-border);
    }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
    .progress-track { height: 5px; background: rgba(79,70,229,0.12); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 99px; transition: width 500ms cubic-bezier(.4,0,.2,1); }

    /* ── Chat ── */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.2); border-radius: 99px; }

    /* ── Welcome ── */
    .welcome-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 24px; text-align: center; padding: 40px 20px; animation: fadeIn 600ms ease;
    }
    .welcome-avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 24px; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; box-shadow: 0 8px 32px rgba(79,70,229,0.30);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .welcome-title {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .welcome-sub { font-size: 1rem; color: var(--text-muted); max-width: 360px; line-height: 1.6; }
    .start-btn {
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px rgba(79,70,229,0.35);
    }
    .start-btn:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(79,70,229,0.45); }

    /* ── Bubbles ── */
    .message-row { display: flex; gap: 10px; animation: fadeSlideIn 300ms ease; max-width: 520px; }
    .message-row.bot { align-self: flex-start; }
    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
    .avatar.bot { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
    .avatar.user { background: linear-gradient(135deg, var(--accent), #0d9488); }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.6; max-width: 420px; }
    .bubble.bot { background: var(--bot-bubble); border: 1px solid var(--surface-border); border-bottom-left-radius: 4px; color: var(--text); }
    .bubble.user { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }

    /* ── Typing ── */
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .typing-dot { width: 7px; height: 7px; background: var(--secondary); border-radius: 50%; animation: typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }

    /* ── Option Cards ── */
    .option-cards { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; max-width: 480px; }
    .option-card {
      padding: 10px 18px; border-radius: 12px; border: 1.5px solid var(--surface-border);
      background: var(--surface); backdrop-filter: blur(8px); cursor: pointer;
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      transition: all var(--transition); box-shadow: var(--shadow);
    }
    .option-card:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-hover); }

    /* ── Factor Panel ── */
    .factor-panel {
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--surface-border); border-radius: var(--radius);
      padding: 20px; max-width: 480px; display: flex; flex-direction: column;
      gap: 16px; box-shadow: var(--shadow); animation: fadeSlideIn 300ms ease;
    }
    .factor-panel-title { font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .factor-row { display: flex; flex-direction: column; gap: 6px; }
    .factor-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--text-muted); }
    .factor-value { font-weight: 700; color: var(--primary); }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 5px; border-radius: 99px; background: rgba(79,70,229,0.15); outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 2px 8px rgba(79,70,229,0.35); transition: transform var(--transition); }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .factor-submit {
      padding: 11px; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(79,70,229,0.30);
    }
    .factor-submit:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(79,70,229,0.40); }

    /* ── Recommendation ── */
    .recommendation-panel {
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--surface-border); border-radius: var(--radius);
      padding: 24px; max-width: 520px; display: flex; flex-direction: column;
      gap: 20px; box-shadow: var(--shadow); animation: fadeSlideIn 400ms ease;
    }
    .rec-header { display: flex; align-items: center; gap: 12px; }
    .rec-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--success), #16a34a); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 4px 16px rgba(34,197,94,0.30); }
    .rec-title { font-weight: 800; font-size: 1.1rem; color: var(--text); }
    .rec-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .confidence-wrap { display: flex; flex-direction: column; gap: 8px; }
    .confidence-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--text-muted); }
    .confidence-score { font-weight: 700; color: var(--success); }
    .confidence-track { height: 8px; background: rgba(34,197,94,0.15); border-radius: 99px; overflow: hidden; }
    .confidence-fill { height: 100%; background: linear-gradient(90deg, var(--success), #16a34a); border-radius: 99px; transition: width 800ms cubic-bezier(.4,0,.2,1); }
    .score-bars { display: flex; flex-direction: column; gap: 10px; }
    .score-bar-row { display: flex; flex-direction: column; gap: 4px; }
    .score-bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); }
    .score-bar-track { height: 6px; background: rgba(79,70,229,0.10); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width 700ms cubic-bezier(.4,0,.2,1); }
    .reasoning-section { border-top: 1px solid var(--surface-border); padding-top: 16px; }
    .reasoning-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--primary); padding: 4px 0; user-select: none; }
    .reasoning-toggle .chevron { transition: transform var(--transition); font-size: 0.75rem; }
    .reasoning-toggle.open .chevron { transform: rotate(180deg); }
    .reasoning-body { font-size: 0.83rem; color: var(--text-muted); line-height: 1.7; margin-top: 10px; display: none; }
    .reasoning-body.open { display: block; animation: fadeIn 200ms ease; }
    .rec-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .rec-btn { padding: 9px 18px; border-radius: 10px; font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: all var(--transition); border: 1.5px solid var(--surface-border); background: var(--surface); color: var(--text); }
    .rec-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); border-color: var(--primary); color: var(--primary); }
    .rec-btn.primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(79,70,229,0.30); }
    .rec-btn.primary:hover { box-shadow: 0 6px 20px rgba(79,70,229,0.45); color: white; }

    /* ── Input ── */
    .input-area { padding: 16px 24px; background: var(--surface); backdrop-filter: blur(16px); border-top: 1px solid var(--surface-border); display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap { flex: 1; background: rgba(79,70,229,0.06); border: 1.5px solid var(--surface-border); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 8px; transition: border-color var(--transition), box-shadow var(--transition); }
    .input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .chat-input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; color: var(--text); resize: none; font-family: inherit; line-height: 1.5; }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; transition: transform var(--transition), box-shadow var(--transition); box-shadow: 0 4px 14px rgba(79,70,229,0.30); flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(79,70,229,0.45); }

    /* ── Confetti ── */
    .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 999; }
    .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 2.5s ease-in forwards; }
    @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--surface-border); backdrop-filter: blur(16px); border-radius: 12px; padding: 12px 18px; font-size: 0.85rem; color: var(--text); box-shadow: var(--shadow-hover); animation: toastIn 300ms ease; z-index: 100; display: flex; align-items: center; gap: 8px; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Sign In Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,14,26,0.55);
      backdrop-filter: blur(6px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 200ms ease;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); backdrop-filter: blur(20px);
      border: 1px solid var(--surface-border); border-radius: 20px;
      padding: 36px 32px; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(79,70,229,0.20);
      animation: modalIn 300ms cubic-bezier(.34,1.56,.64,1);
      display: flex; flex-direction: column; gap: 20px;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header { text-align: center; }
    .modal-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .modal-title { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .modal-sub { font-size: 0.83rem; color: var(--text-muted); margin-top: 4px; }
    .modal-tabs { display: flex; background: rgba(79,70,229,0.07); border-radius: 10px; padding: 3px; gap: 3px; }
    .modal-tab { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; font-size: 0.83rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all var(--transition); }
    .modal-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,0.12); }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
    .form-input {
      padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid var(--surface-border); background: rgba(79,70,229,0.04);
      font-size: 0.88rem; color: var(--text); outline: none; font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.10); }
    .form-input::placeholder { color: var(--text-muted); }
    .modal-submit {
      padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: 12px; font-size: 0.92rem; font-weight: 700;
      cursor: pointer; transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(79,70,229,0.30); margin-top: 4px;
    }
    .modal-submit:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(79,70,229,0.42); }
    .modal-divider { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--text-muted); }
    .modal-divider::before, .modal-divider::after { content: ''; flex: 1; height: 1px; background: var(--surface-border); }
    .social-btns { display: flex; gap: 8px; }
    .social-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--surface-border);
      background: var(--surface); font-size: 0.82rem; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .social-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.03); }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 8px; border: none; background: rgba(79,70,229,0.08); cursor: pointer; font-size: 1rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .modal-close:hover { background: rgba(79,70,229,0.15); color: var(--text); }
    .modal { position: relative; }

    @media (max-width: 700px) { .sidebar { display: none; } }
  </style>

</head>
<body>

<!-- Sign In Modal -->
<div class="modal-overlay hidden" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-icon">🧠</div>
      <div class="modal-title">Welcome Back</div>
      <div class="modal-sub">Sign in to save and track your decisions</div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="modal-tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="modal-form" id="authForm">
      <div class="form-group" id="nameGroup" style="display:none">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="inputName" type="text" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="inputEmail" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="inputPassword" type="password" placeholder="••••••••" />
      </div>
      <button class="modal-submit" id="authSubmit" onclick="handleAuth()">Sign In</button>
    </div>
    <div class="modal-divider">or continue with</div>
    <div class="social-btns">
      <button class="social-btn" onclick="socialLogin('Google')">🌐 Google</button>
      <button class="social-btn" onclick="socialLogin('GitHub')">🐙 GitHub</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🧠</div>
      Decision Helper
    </div>

    <!-- Auth strip -->
    <div id="authStrip">
      <button class="sign-in-btn" onclick="openModal()">Sign In / Sign Up</button>
    </div>

    <!-- History -->
    <div style="display:flex;flex-direction:column;gap:8px;flex:1;min-height:0">
      <div class="sidebar-section-title">
        Decision History
        <span class="history-count" id="historyCount">0</span>
      </div>
      <div class="history-scroll" id="historyList">
        <div class="history-empty" id="historyEmpty">
          <div class="empty-icon">📋</div>
          No decisions yet.<br/>Complete a session to see your history here.
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeLabel">🌙 Dark Mode</span>
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-thumb"></div>
        </div>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div>
        <div class="header-title">Decision Helper Bot</div>
        <div class="header-sub" id="headerSub">Ready to help you decide</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="New Decision" onclick="resetChat()">✨</button>
        <button class="icon-btn" title="Save Result" onclick="saveResult()">💾</button>
        <button class="icon-btn" title="Share" onclick="shareResult()">🔗</button>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span id="progressLabel">Getting started</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput" rows="1"
          placeholder="Type your answer or choose an option above…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" onclick="sendUserMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let step = 0, decisionData = {}, isDark = false, isTyping = false;
let currentUser = null;
let decisionHistory = JSON.parse(localStorage.getItem('dhb_history') || '[]');
let authMode = 'signin';

// ── Init ──
window.onload = () => {
  const saved = localStorage.getItem('dhb_user');
  if (saved) { currentUser = JSON.parse(saved); renderUserStrip(); }
  renderHistory();
  showWelcome();
};

// ── Auth ──
function openModal() { document.getElementById('authModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('authModal').classList.add('hidden'); }

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tabSignIn').classList.toggle('active', mode === 'signin');
  document.getElementById('tabSignUp').classList.toggle('active', mode === 'signup');
  document.getElementById('nameGroup').style.display = mode === 'signup' ? 'flex' : 'none';
  document.getElementById('authSubmit').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
}

function handleAuth() {
  const email = document.getElementById('inputEmail').value.trim();
  const password = document.getElementById('inputPassword').value;
  const name = document.getElementById('inputName').value.trim();
  if (!email || !password) { showToast('⚠️ Please fill in all fields'); return; }
  const displayName = authMode === 'signup' ? (name || email.split('@')[0]) : email.split('@')[0];
  currentUser = { name: displayName, email, avatar: displayName[0].toUpperCase() };
  localStorage.setItem('dhb_user', JSON.stringify(currentUser));
  closeModal();
  renderUserStrip();
  showToast(`👋 Welcome, ${displayName}!`);
}

function socialLogin(provider) {
  currentUser = { name: `${provider} User`, email: `user@${provider.toLowerCase()}.com`, avatar: provider[0] };
  localStorage.setItem('dhb_user', JSON.stringify(currentUser));
  closeModal();
  renderUserStrip();
  showToast(`✅ Signed in with ${provider}`);
}

function signOut() {
  currentUser = null;
  localStorage.removeItem('dhb_user');
  document.getElementById('authStrip').innerHTML = `<button class="sign-in-btn" onclick="openModal()">Sign In / Sign Up</button>`;
  showToast('👋 Signed out');
}

function renderUserStrip() {
  document.getElementById('authStrip').innerHTML = `
    <div class="user-strip" onclick="signOut()" title="Click to sign out">
      <div class="user-avatar">${currentUser.avatar}</div>
      <div class="user-info">
        <div class="user-name">${currentUser.name}</div>
        <div class="user-email">${currentUser.email}</div>
      </div>
      <span style="font-size:0.7rem;color:var(--text-muted)">↩</span>
    </div>`;
}

// ── History ──
function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const count = document.getElementById('historyCount');
  count.textContent = decisionHistory.length;
  if (decisionHistory.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  // Remove old cards
  list.querySelectorAll('.history-card').forEach(c => c.remove());
  // Render newest first
  [...decisionHistory].reverse().forEach(item => {
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <div class="history-card-top">
        <span class="history-topic">${item.topic}</span>
        <span class="history-winner-badge">✓ ${item.winner}</span>
      </div>
      <div class="history-summary">${item.summary}</div>
      <div class="history-meta">
        <span class="history-conf">⚡ ${item.confidence}% confidence</span>
        <span class="history-time">${item.time}</span>
      </div>`;
    list.appendChild(card);
  });
}

function addToHistory(data) {
  const { topic, optionA, optionB, scoreA, scoreB, priority, confidence } = data;
  const winner = scoreA >= scoreB ? optionA : optionB;
  const loser  = scoreA >= scoreB ? optionB : optionA;
  const summary = `${optionA} vs ${optionB} · Priority: ${priority.replace(/^[^\s]+\s/,'')} · ${winner} scored higher`;
  const entry = {
    topic, winner, loser, summary,
    confidence,
    time: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  };
  decisionHistory.push(entry);
  localStorage.setItem('dhb_history', JSON.stringify(decisionHistory));
  renderHistory();
}

// ── Welcome ──
function showWelcome() {
  document.getElementById('chatArea').innerHTML = `
    <div class="welcome-screen">
      <div class="welcome-avatar">🧠</div>
      <div>
        <div class="welcome-title">Decision Helper Bot</div>
        <p class="welcome-sub" style="margin-top:10px">Feeling stuck? I'll walk you through a structured process to help you make a clear, confident decision — step by step.</p>
      </div>
      <button class="start-btn" onclick="startFlow()">Let's make your decision easier ✨</button>
    </div>`;
  setProgress(0, 'Getting started');
}

// ── Flow ──
function startFlow() {
  step = 1; clearChat(); decisionData = {};
  document.getElementById('headerSub').textContent = 'Working through your decision…';
  setProgress(10, 'Defining the decision');
  botSay("Hey there 👋 I'm here to help you think through a decision clearly and calmly.", () => {
    botSay("First — what decision are you trying to make?", () => {
      showOptions(['Career change','Buy vs Rent','Tech stack choice','Job offer comparison','Relocation','Other…'], val => {
        decisionData.topic = val; userSay(val);
        setProgress(25, 'Exploring options'); askOptions();
      });
    });
  });
}

function askOptions() {
  botSay(`Got it — "${decisionData.topic}". What are the main options you're considering?`, () => {
    botSay('Pick up to 3, or type your own below.', () => {
      showOptions(['Option A','Option B','Option C','Option D'], val => {
        decisionData.optionA = val; userSay(val);
        botSay('And the alternative option?', () => {
          showOptions(['Option B','Option C','Option D','Something else'].filter(o=>o!==val), val2 => {
            decisionData.optionB = val2; userSay(val2);
            setProgress(45, 'Weighing factors'); askFactors();
          });
        });
      });
    });
  });
}

function askFactors() {
  setProgress(55, 'Weighing factors');
  botSay(`Perfect. Now let's rate the key factors for each option. 🎯`, () => {
    botSay(`Rate these for "${decisionData.optionA}" vs "${decisionData.optionB}" on a scale of 1–5.`, () => {
      showFactorPanel();
    });
  });
}

function showFactorPanel() {
  const area = document.getElementById('chatArea');
  const panel = document.createElement('div');
  panel.className = 'factor-panel'; panel.id = 'factorPanel';
  const factors = [
    { key:'cost',    label:'💰 Cost / Affordability', colorA:'#4F46E5', colorB:'#8B5CF6' },
    { key:'time',    label:'⏱ Time Investment',       colorA:'#14B8A6', colorB:'#0d9488' },
    { key:'risk',    label:'⚠️ Risk Level',            colorA:'#F59E0B', colorB:'#D97706' },
    { key:'benefit', label:'🚀 Long-term Benefit',     colorA:'#22C55E', colorB:'#16a34a' },
    { key:'stress',  label:'🧘 Stress / Ease',         colorA:'#EC4899', colorB:'#DB2777' },
  ];
  panel.innerHTML = `
    <div class="factor-panel-title">📊 Factor Breakdown</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:0.75rem;color:var(--text-muted);margin-bottom:-8px">
      <span style="color:var(--primary);font-weight:600">${decisionData.optionA}</span>
      <span style="color:var(--secondary);font-weight:600;text-align:right">${decisionData.optionB}</span>
    </div>
    ${factors.map(f=>`
      <div class="factor-row">
        <div class="factor-label">
          <span>${f.label}</span>
          <span><span class="factor-value" id="val_${f.key}_a" style="color:${f.colorA}">3</span>
          <span style="color:var(--text-muted)"> / </span>
          <span class="factor-value" id="val_${f.key}_b" style="color:${f.colorB}">3</span></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="range" min="1" max="5" value="3" id="slider_${f.key}_a" style="accent-color:${f.colorA}" oninput="document.getElementById('val_${f.key}_a').textContent=this.value"/>
          <input type="range" min="1" max="5" value="3" id="slider_${f.key}_b" style="accent-color:${f.colorB}" oninput="document.getElementById('val_${f.key}_b').textContent=this.value"/>
        </div>
      </div>`).join('')}
    <button class="factor-submit" onclick="submitFactors()">Analyze My Decision →</button>`;
  area.appendChild(panel); scrollBottom();
}

function submitFactors() {
  const factors = ['cost','time','risk','benefit','stress'];
  let scoreA = 0, scoreB = 0; const breakdown = {};
  factors.forEach(f => {
    const a = parseInt(document.getElementById(`slider_${f}_a`).value);
    const b = parseInt(document.getElementById(`slider_${f}_b`).value);
    const wa = f==='risk'?(6-a):a, wb = f==='risk'?(6-b):b;
    scoreA+=wa; scoreB+=wb; breakdown[f]={a,b};
  });
  decisionData.scoreA=scoreA; decisionData.scoreB=scoreB; decisionData.breakdown=breakdown;
  document.getElementById('factorPanel').remove();
  userSay('Submitted my factor ratings ✓');
  setProgress(75, 'Setting priorities'); askPriority();
}

function askPriority() {
  botSay('Almost there! What matters most to you right now?', () => {
    showOptions(['💰 Saving money','⏱ Saving time','🚀 Long-term growth','🧘 Peace of mind','⚠️ Minimizing risk'], val => {
      decisionData.priority = val; userSay(val);
      setProgress(90, 'Generating recommendation…');
      botSay('Analyzing everything… give me a moment 🤔', () => {
        setTimeout(() => showRecommendation(), 1200);
      });
    });
  });
}

function showRecommendation() {
  const { optionA, optionB, scoreA, scoreB, breakdown, priority } = decisionData;
  const winner = scoreA>=scoreB?optionA:optionB, loser = scoreA>=scoreB?optionB:optionA;
  const winScore=Math.max(scoreA,scoreB), loseScore=Math.min(scoreA,scoreB), total=25;
  const confidence = Math.min(Math.max(Math.round(((winScore/total)*0.6+(winScore-loseScore)/total*0.4)*100),52),94);
  decisionData.confidence = confidence;
  const factorColors = { cost:'#4F46E5',time:'#14B8A6',risk:'#F59E0B',benefit:'#22C55E',stress:'#EC4899' };
  const factorLabels = { cost:'💰 Cost',time:'⏱ Time',risk:'⚠️ Risk',benefit:'🚀 Benefit',stress:'🧘 Ease' };
  const reasoning = `Based on your ratings, "${winner}" scored higher across most factors. Your priority of "${priority}" aligns well with this choice. The score gap of ${Math.abs(scoreA-scoreB)} points suggests a ${confidence>75?'clear':'moderate'} advantage. While "${loser}" has its merits, the overall analysis favors "${winner}" for your current situation.`;

  botSay(`I've finished analyzing your decision. Here's what I found 👇`, () => {
    const area = document.getElementById('chatArea');
    const panel = document.createElement('div');
    panel.className = 'recommendation-panel';
    panel.innerHTML = `
      <div class="rec-header">
        <div class="rec-icon">✅</div>
        <div><div class="rec-title">Recommended: ${winner}</div><div class="rec-sub">Based on your priorities and factor ratings</div></div>
      </div>
      <div class="confidence-wrap">
        <div class="confidence-label"><span>Confidence Score</span><span class="confidence-score">${confidence}%</span></div>
        <div class="confidence-track"><div class="confidence-fill" id="confFill" style="width:0%"></div></div>
      </div>
      <div class="score-bars">
        <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:4px">Factor Comparison</div>
        ${Object.entries(breakdown).map(([key,val])=>{
          const pA=(val.a/5)*100, pB=(val.b/5)*100;
          return `<div class="score-bar-row">
            <div class="score-bar-label"><span>${factorLabels[key]}</span><span style="color:var(--primary)">${optionA}: ${val.a}</span><span style="color:var(--secondary)">${optionB}: ${val.b}</span></div>
            <div style="display:flex;flex-direction:column;gap:3px">
              <div class="score-bar-track"><div class="score-bar-fill" style="width:0%;background:${factorColors[key]};opacity:0.9" data-width="${pA}"></div></div>
              <div class="score-bar-track"><div class="score-bar-fill" style="width:0%;background:${factorColors[key]};opacity:0.5" data-width="${pB}"></div></div>
            </div></div>`;
        }).join('')}
      </div>
      <div class="reasoning-section">
        <div class="reasoning-toggle" onclick="toggleReasoning(this)">💡 Explain the reasoning <span class="chevron">▼</span></div>
        <div class="reasoning-body">${reasoning}</div>
      </div>
      <div class="rec-actions">
        <button class="rec-btn primary" onclick="celebrate()">🎉 Accept Decision</button>
        <button class="rec-btn" onclick="saveResult()">💾 Save</button>
        <button class="rec-btn" onclick="resetChat()">🔄 New Decision</button>
      </div>`;
    area.appendChild(panel); scrollBottom();
    setProgress(100, 'Recommendation ready');
    document.getElementById('headerSub').textContent = `Recommended: ${winner}`;
    setTimeout(() => {
      document.getElementById('confFill').style.width = confidence+'%';
      document.querySelectorAll('.score-bar-fill[data-width]').forEach(el => el.style.width = el.dataset.width+'%');
    }, 100);
    // Auto-save to history
    addToHistory({ ...decisionData, winner, confidence });
  });
}

// ── UI Helpers ──
function botSay(text, callback) {
  if (isTyping) { setTimeout(()=>botSay(text,callback),300); return; }
  isTyping = true;
  const area = document.getElementById('chatArea');
  const typingRow = document.createElement('div');
  typingRow.className = 'message-row bot'; typingRow.id = 'typingRow';
  typingRow.innerHTML = `<div class="avatar bot">🧠</div><div class="bubble bot"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  area.appendChild(typingRow); scrollBottom();
  setTimeout(() => {
    typingRow.remove();
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.innerHTML = `<div class="avatar bot">🧠</div><div class="bubble bot">${text}</div>`;
    area.appendChild(row); scrollBottom();
    isTyping = false;
    if (callback) setTimeout(callback, 300);
  }, Math.min(600 + text.length * 12, 1800));
}

function userSay(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'message-row user';
  row.innerHTML = `<div class="avatar user">👤</div><div class="bubble user">${text}</div>`;
  area.appendChild(row); scrollBottom();
}

function showOptions(opts, onSelect) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'option-cards'; wrap.id = 'optionCards';
  opts.forEach(opt => {
    const card = document.createElement('div');
    card.className = 'option-card'; card.textContent = opt;
    card.onclick = () => { document.getElementById('optionCards')?.remove(); onSelect(opt); };
    wrap.appendChild(card);
  });
  area.appendChild(wrap); scrollBottom();
}

function clearChat() { document.getElementById('chatArea').innerHTML = ''; }
function scrollBottom() { const a=document.getElementById('chatArea'); setTimeout(()=>a.scrollTop=a.scrollHeight,50); }
function setProgress(pct,label) { document.getElementById('progressFill').style.width=pct+'%'; document.getElementById('progressPct').textContent=pct+'%'; document.getElementById('progressLabel').textContent=label; }
function toggleReasoning(el) { el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendUserMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function sendUserMessage() {
  const input=document.getElementById('chatInput'); const text=input.value.trim();
  if(!text) return; input.value=''; input.style.height='auto';
  if(step===0){startFlow();return;} userSay(text);
  setTimeout(()=>botSay("Thanks! Use the options above to continue, or click ✨ to start fresh."),400);
}
function toggleTheme() {
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('themeLabel').textContent=isDark?'☀️ Light Mode':'🌙 Dark Mode';
  document.getElementById('toggleTrack').classList.toggle('on',isDark);
}
function resetChat() { step=0; decisionData={}; isTyping=false; document.getElementById('headerSub').textContent='Ready to help you decide'; showWelcome(); }
function saveResult() {
  if(!decisionData.topic){showToast('⚠️ No decision to save yet');return;}
  addToHistory({ ...decisionData, winner: decisionData.scoreA>=decisionData.scoreB?decisionData.optionA:decisionData.optionB, confidence: decisionData.confidence||70 });
  showToast('💾 Saved to history');
}
function shareResult() { navigator.clipboard?.writeText(window.location.href).catch(()=>{}); showToast('🔗 Link copied to clipboard'); }
function celebrate() { showToast('🎉 Great choice! Decision locked in.'); launchConfetti(); }
function showToast(msg) {
  const e=document.querySelector('.toast'); if(e) e.remove();
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function launchConfetti() {
  const colors=['#4F46E5','#8B5CF6','#14B8A6','#22C55E','#F59E0B','#EC4899'];
  const c=document.createElement('div'); c.className='celebration'; document.body.appendChild(c);
  for(let i=0;i<60;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;animation-duration:${1.8+Math.random()*1.2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
    c.appendChild(p);
  }
  setTimeout(()=>c.remove(),4000);
}
</script>
</body>
</html>
