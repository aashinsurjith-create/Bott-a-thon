<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decision Helper Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4F46E5; --secondary: #8B5CF6; --accent: #14B8A6;
      --bg-start: #ffffff; --bg-end: #f0eeff;
      --surface: rgba(255,255,255,0.75); --surface-border: rgba(139,92,246,0.15);
      --text: #1F2937; --text-muted: #6B7280; --success: #22C55E;
      --bot-bubble: linear-gradient(135deg,#f5f3ff,#ede9fe);
      --user-bubble: #4F46E5;
      --shadow: 0 4px 24px rgba(79,70,229,0.10);
      --shadow-hover: 0 8px 32px rgba(79,70,229,0.18);
      --radius: 16px; --transition: 200ms ease-in-out;
    }
    [data-theme="dark"] {
      --bg-start: #0f0e1a; --bg-end: #1a1730;
      --surface: rgba(30,27,60,0.82); --surface-border: rgba(139,92,246,0.25);
      --text: #F3F4F6; --text-muted: #9CA3AF;
      --bot-bubble: linear-gradient(135deg,#1e1b3c,#2d2660);
      --shadow: 0 4px 24px rgba(0,0,0,0.40); --shadow-hover: 0 8px 32px rgba(79,70,229,0.30);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%); min-height: 100vh; color: var(--text); transition: background var(--transition), color var(--transition); }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 270px; background: var(--surface); backdrop-filter: blur(16px); border-right: 1px solid var(--surface-border); display: flex; flex-direction: column; padding: 20px 14px; gap: 16px; flex-shrink: 0; overflow: hidden; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; color: var(--primary); }
    .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .user-strip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; background: rgba(79,70,229,0.07); }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: white; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .signout-btn { background: none; border: none; cursor: pointer; font-size: 0.72rem; color: var(--text-muted); padding: 4px 8px; border-radius: 6px; transition: all var(--transition); white-space: nowrap; }
    .signout-btn:hover { background: rgba(239,68,68,0.1); color: #EF4444; }
    .section-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); padding: 0 4px; display: flex; align-items: center; justify-content: space-between; }
    .history-count { background: rgba(79,70,229,0.12); color: var(--primary); font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
    .history-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .history-scroll::-webkit-scrollbar { width: 3px; }
    .history-scroll::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.2); border-radius: 99px; }
    .history-empty { text-align: center; padding: 24px 8px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
    .history-card { padding: 10px 12px; border-radius: 12px; border: 1px solid var(--surface-border); background: rgba(79,70,229,0.04); cursor: pointer; transition: all var(--transition); display: flex; flex-direction: column; gap: 5px; }
    .history-card:hover { background: rgba(79,70,229,0.09); border-color: rgba(79,70,229,0.25); transform: translateX(2px); }
    .hc-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .hc-topic { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .hc-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; background: rgba(34,197,94,0.15); color: var(--success); white-space: nowrap; flex-shrink: 0; }
    .hc-summary { font-size: 0.73rem; color: var(--text-muted); line-height: 1.5; }
    .hc-meta { display: flex; align-items: center; }
    .hc-conf { font-size: 0.68rem; color: var(--primary); font-weight: 600; }
    .hc-time { font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }
    .sidebar-footer { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 10px; background: rgba(79,70,229,0.07); cursor: pointer; font-size: 0.82rem; color: var(--text-muted); transition: background var(--transition); border: none; width: 100%; }
    .theme-toggle:hover { background: rgba(79,70,229,0.14); }
    .toggle-track { width: 34px; height: 18px; background: var(--text-muted); border-radius: 10px; position: relative; transition: background var(--transition); }
    .toggle-track.on { background: var(--primary); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform var(--transition); }
    .toggle-track.on .toggle-thumb { transform: translateX(16px); }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); backdrop-filter: blur(16px); border-bottom: 1px solid var(--surface-border); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-title { font-weight: 700; font-size: 1rem; color: var(--text); }
    .header-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .ai-badge { font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 99px; background: linear-gradient(135deg,rgba(79,70,229,0.12),rgba(139,92,246,0.12)); color: var(--primary); border: 1px solid rgba(79,70,229,0.2); }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--surface-border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text-muted); transition: all var(--transition); }
    .icon-btn:hover { background: rgba(79,70,229,0.10); color: var(--primary); transform: scale(1.05); }
    .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.2); border-radius: 99px; }
    .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; text-align: center; padding: 40px 20px; animation: fadeIn 600ms ease; }
    .welcome-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; box-shadow: 0 8px 32px rgba(79,70,229,0.30); animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .welcome-title { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .welcome-sub { font-size: 0.95rem; color: var(--text-muted); max-width: 380px; line-height: 1.7; }
    .quick-starts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 440px; }
    .quick-chip { padding: 9px 16px; border-radius: 99px; border: 1.5px solid var(--surface-border); background: var(--surface); backdrop-filter: blur(8px); cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--text); transition: all var(--transition); box-shadow: var(--shadow); }
    .quick-chip:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .message-row { display: flex; gap: 10px; animation: fadeSlideIn 300ms ease; max-width: 580px; }
    .message-row.bot { align-self: flex-start; }
    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
    .avatar.bot { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
    .avatar.user { background: linear-gradient(135deg, var(--accent), #0d9488); }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.65; max-width: 480px; word-break: break-word; white-space: pre-wrap; }
    .bubble.bot { background: var(--bot-bubble); border: 1px solid var(--surface-border); border-bottom-left-radius: 4px; color: var(--text); }
    .bubble.user { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .typing-dot { width: 7px; height: 7px; background: var(--secondary); border-radius: 50%; animation: typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-6px);opacity:1} }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; max-width: 480px; align-self: flex-start; animation: fadeSlideIn 300ms ease; }
    .qr-chip { padding: 8px 15px; border-radius: 99px; border: 1.5px solid var(--surface-border); background: var(--surface); cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--text); transition: all var(--transition); }
    .qr-chip:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
    .input-area { padding: 14px 24px; background: var(--surface); backdrop-filter: blur(16px); border-top: 1px solid var(--surface-border); display: flex; gap: 10px; align-items: flex-end; }
    .input-wrap { flex: 1; background: rgba(79,70,229,0.06); border: 1.5px solid var(--surface-border); border-radius: 14px; padding: 11px 16px; display: flex; align-items: center; gap: 8px; transition: border-color var(--transition), box-shadow var(--transition); }
    .input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .chat-input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; color: var(--text); resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; transition: transform var(--transition), box-shadow var(--transition); box-shadow: 0 4px 14px rgba(79,70,229,0.30); flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 6px 18px rgba(79,70,229,0.45); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 999; }
    .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 2.5s ease-in forwards; }
    @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--surface-border); backdrop-filter: blur(16px); border-radius: 12px; padding: 12px 18px; font-size: 0.85rem; color: var(--text); box-shadow: var(--shadow-hover); animation: toastIn 300ms ease; z-index: 100; }
    @keyframes toastIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @media (max-width: 700px) { .sidebar { display: none; } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🧠</div>Decision Helper</div>
    <div class="user-strip">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">Loading…</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;flex:1;min-height:0">
      <div class="section-title">Decision History <span class="history-count" id="historyCount">0</span></div>
      <div class="history-scroll" id="historyList">
        <div class="history-empty" id="historyEmpty" style="display:block">
          <div style="font-size:1.8rem;margin-bottom:8px">📋</div>
          No decisions yet.<br/>Complete a session to see history here.
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeLabel">🌙 Dark Mode</span>
        <div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="header">
      <div class="header-left">
        <div>
          <div class="header-title">Decision Helper Bot</div>
          <div class="header-sub" id="headerSub">Powered by AI</div>
        </div>
        <span class="ai-badge">✨ GPT-4o mini</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="New Chat" onclick="resetChat()">✨</button>
        <button class="icon-btn" title="Share" onclick="shareResult()">🔗</button>
      </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput" rows="1"
          placeholder="Describe your decision or ask anything…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ── Auth guard ──
const token = localStorage.getItem('dhb_token');
const currentUser = JSON.parse(localStorage.getItem('dhb_user') || 'null');
if (currentUser && typeof currentUser.id === 'number') {
  localStorage.removeItem('dhb_token'); localStorage.removeItem('dhb_user');
  window.location.href = 'index.html';
}
if (!token || !currentUser) window.location.href = 'index.html';

// ── Render user ──
document.getElementById('userAvatar').textContent = (currentUser.name || 'U')[0].toUpperCase();
document.getElementById('userName').textContent = currentUser.name;
document.getElementById('userEmail').textContent = currentUser.email;

function signOut() {
  localStorage.removeItem('dhb_token'); localStorage.removeItem('dhb_user');
  window.location.href = 'index.html';
}

// ── State ──
let isDark = false;
let isWaiting = false;
// Conversation history sent to AI (role/content pairs)
let messages = [];
// Lightweight context the AI uses to track decision progress
let decisionContext = {};

// ── Init ──
window.onload = () => { loadHistory(); showWelcome(); };

// ── Welcome ──
function showWelcome() {
  messages = []; decisionContext = {};
  document.getElementById('headerSub').textContent = 'Powered by AI';
  document.getElementById('chatArea').innerHTML = `
    <div class="welcome-screen">
      <div class="welcome-avatar">🧠</div>
      <div>
        <div class="welcome-title">Hey, ${currentUser.name.split(' ')[0]} 👋</div>
        <p class="welcome-sub">I'm your AI decision coach. Tell me what you're trying to decide and I'll help you think it through clearly.</p>
      </div>
      <div class="quick-starts">
        <div class="quick-chip" onclick="quickStart('I need to choose between two job offers')">💼 Job offers</div>
        <div class="quick-chip" onclick="quickStart('Should I buy or rent a home?')">🏠 Buy vs Rent</div>
        <div class="quick-chip" onclick="quickStart('I need to pick a tech stack for my project')">💻 Tech stack</div>
        <div class="quick-chip" onclick="quickStart('I am considering relocating to a new city')">🌍 Relocation</div>
        <div class="quick-chip" onclick="quickStart('Help me decide on a career change')">🚀 Career change</div>
      </div>
    </div>`;
}

function quickStart(text) {
  clearChat();
  addUserBubble(text);
  messages.push({ role: 'user', content: text });
  callAI();
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isWaiting) return;
  input.value = ''; input.style.height = 'auto';

  // Clear welcome screen on first message
  if (document.querySelector('.welcome-screen')) clearChat();

  addUserBubble(text);
  messages.push({ role: 'user', content: text });
  callAI();
}

// ── Call AI ──
async function callAI() {
  setWaiting(true);
  const typingId = showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ messages, decisionContext })
    });

    removeTyping(typingId);

    if (res.status === 401) { signOut(); return; }

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI error');

    const reply = data.reply;
    messages.push({ role: 'assistant', content: reply });

    addBotBubble(reply);
    updateContext(reply);
    showSmartReplies(reply);

  } catch (err) {
    removeTyping(typingId);
    addBotBubble(`Sorry, I ran into an issue: ${err.message}. Please try again.`);
  } finally {
    setWaiting(false);
  }
}

// ── Parse AI reply to update context & detect completion ──
function updateContext(reply) {
  const lower = reply.toLowerCase();

  // Detect if AI gave a recommendation
  const confMatch = reply.match(/(\d{1,3})%\s*confident/i);
  if (confMatch) {
    const confidence = parseInt(confMatch[1]);
    decisionContext.confidence = confidence;

    // Try to extract winner from "Option A is the better choice" patterns
    const winnerMatch = reply.match(/(?:recommend|suggest|go with|choose|pick)\s+["']?([^"',.\n]{3,40})["']?/i);
    if (winnerMatch) decisionContext.winner = winnerMatch[1].trim();

    // Auto-save to history when recommendation is made
    if (decisionContext.topic && decisionContext.winner) {
      saveDecisionToServer({
        topic: decisionContext.topic,
        winner: decisionContext.winner,
        loser: decisionContext.loser || 'Other option',
        summary: reply.substring(0, 120) + '…',
        confidence
      });
      document.getElementById('headerSub').textContent = `Recommended: ${decisionContext.winner}`;
      setTimeout(() => launchConfetti(), 400);
    }
  }

  // Extract topic from early messages
  if (!decisionContext.topic && messages.length <= 4) {
    const topicMatch = reply.match(/deciding (?:between|on|about)\s+([^.?\n]{5,60})/i)
      || reply.match(/choice (?:between|of)\s+([^.?\n]{5,60})/i);
    if (topicMatch) decisionContext.topic = topicMatch[1].trim();
    else if (messages[0]) decisionContext.topic = messages[0].content.substring(0, 60);
  }
}

// ── Smart quick replies based on conversation stage ──
function showSmartReplies(reply) {
  const lower = reply.toLowerCase();
  let chips = [];

  if (lower.includes('option') || lower.includes('choice') || lower.includes('consider')) {
    chips = ['Tell me more about the pros', 'What are the risks?', 'Which is cheaper?', 'Which saves more time?'];
  } else if (lower.includes('cost') || lower.includes('budget') || lower.includes('afford')) {
    chips = ['Cost is my top priority', 'Cost matters but not the only factor', 'Budget is flexible'];
  } else if (lower.includes('risk') || lower.includes('safe') || lower.includes('uncertain')) {
    chips = ['I prefer low risk', 'I can handle some risk', 'Risk is not a concern'];
  } else if (lower.includes('recommend') || lower.includes('suggest') || lower.includes('confident')) {
    chips = ['I accept this recommendation 🎉', 'Explain your reasoning more', 'Start a new decision'];
  } else if (lower.includes('priority') || lower.includes('matter') || lower.includes('important')) {
    chips = ['Long-term growth matters most', 'Peace of mind is key', 'Saving money is priority', 'Saving time is priority'];
  }

  if (chips.length) {
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';
    chips.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'qr-chip'; chip.textContent = c;
      chip.onclick = () => {
        wrap.remove();
        if (c === 'Start a new decision') { resetChat(); return; }
        if (c === 'I accept this recommendation 🎉') { launchConfetti(); showToast('🎉 Decision locked in!'); return; }
        document.querySelector('.welcome-screen') && clearChat();
        addUserBubble(c);
        messages.push({ role: 'user', content: c });
        callAI();
      };
      wrap.appendChild(chip);
    });
    document.getElementById('chatArea').appendChild(wrap);
    scrollBottom();
  }
}

// ── UI helpers ──
function addBotBubble(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div'); row.className = 'message-row bot';
  row.innerHTML = `<div class="avatar bot">🧠</div><div class="bubble bot">${text}</div>`;
  area.appendChild(row); scrollBottom();
}

function addUserBubble(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div'); row.className = 'message-row user';
  row.innerHTML = `<div class="avatar user">👤</div><div class="bubble user">${text}</div>`;
  area.appendChild(row); scrollBottom();
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const id = 'typing_' + Date.now();
  const row = document.createElement('div'); row.className = 'message-row bot'; row.id = id;
  row.innerHTML = `<div class="avatar bot">🧠</div><div class="bubble bot"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  area.appendChild(row); scrollBottom();
  return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

function setWaiting(on) {
  isWaiting = on;
  document.getElementById('sendBtn').disabled = on;
  document.getElementById('chatInput').disabled = on;
}

function clearChat() { document.getElementById('chatArea').innerHTML = ''; }
function scrollBottom() { const a = document.getElementById('chatArea'); setTimeout(() => a.scrollTop = a.scrollHeight, 50); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function resetChat() { messages = []; decisionContext = {}; showWelcome(); }
function shareResult() { navigator.clipboard?.writeText(window.location.href).catch(() => {}); showToast('🔗 Link copied'); }
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeLabel').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
  document.getElementById('toggleTrack').classList.toggle('on', isDark);
}
function showToast(msg) {
  const e = document.querySelector('.toast'); if (e) e.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}
function launchConfetti() {
  const colors = ['#4F46E5','#8B5CF6','#14B8A6','#22C55E','#F59E0B','#EC4899'];
  const c = document.createElement('div'); c.className = 'celebration'; document.body.appendChild(c);
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;animation-duration:${1.8+Math.random()*1.2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 4000);
}

// ── History ──
async function loadHistory() {
  try {
    const res = await fetch('/api/decisions', { headers: { Authorization: 'Bearer ' + token } });
    if (res.ok) renderHistory(await res.json());
  } catch {}
}

function renderHistory(decisions) {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  document.getElementById('historyCount').textContent = decisions.length;
  if (!decisions.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.querySelectorAll('.history-card').forEach(c => c.remove());
  decisions.forEach(item => {
    const card = document.createElement('div'); card.className = 'history-card';
    const time = new Date(item.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    card.innerHTML = `
      <div class="hc-top"><span class="hc-topic">${item.topic}</span><span class="hc-badge">✓ ${item.winner}</span></div>
      <div class="hc-summary">${item.summary}</div>
      <div class="hc-meta"><span class="hc-conf">⚡ ${item.confidence}% confidence</span><span class="hc-time">${time}</span></div>`;
    list.appendChild(card);
  });
}

async function saveDecisionToServer(data) {
  try {
    await fetch('/api/decisions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(data)
    });
    loadHistory();
  } catch {}
}
</script>
